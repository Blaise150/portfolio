<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message reçu — Behou Blaise</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#13121f;color:#f0ece4;
  font-family:'Rajdhani',sans-serif;
  min-height:100vh;display:flex;
  flex-direction:column;align-items:center;
  justify-content:center;text-align:center;
  padding:2rem;
}
.card{
  background:#1c1a2e;
  border:1px solid rgba(201,168,76,.3);
  padding:3rem 2.5rem;
  max-width:480px;width:100%;
  animation:up .7s forwards;
}
.icon{font-size:3.5rem;margin-bottom:1.25rem;display:block}
h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.8rem,5vw,2.5rem);
  font-weight:700;color:#c9a84c;
  margin-bottom:.75rem;
}
p{
  font-size:clamp(.9rem,2vw,1rem);
  color:#948f8a;line-height:1.8;
  margin-bottom:2rem;
}
.btn{
  display:inline-block;
  background:#c9a84c;color:#13121f;
  font-family:'Rajdhani',sans-serif;
  font-size:.8rem;font-weight:700;
  letter-spacing:.14em;text-transform:uppercase;
  padding:.875rem 2rem;text-decoration:none;
  transition:background .3s,transform .2s;
}
.btn:hover{background:#e8c96a;transform:translateY(-2px)}
@keyframes up{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
  <div class="card">
    <span class="icon">✉️</span>
    <h1>Message reçu !</h1>
    <p>Merci pour votre message. Je vous répondrai dans les plus brefs délais — généralement sous 24h.</p>
    <a href="/" class="btn">← Retour au portfolio</a>
  </div>
</body>
</html>
