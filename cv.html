<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV — Behou Blaise</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

/* Bloquer impression */
@media print{
  body{display:none !important}
}

body{
  background:#13121f;color:#f0ece4;
  font-family:'Rajdhani',sans-serif;
  min-height:100vh;
  user-select:none;
  -webkit-user-select:none;
}

/* NAVBAR */
.topbar{
  position:sticky;top:0;z-index:100;
  display:flex;justify-content:space-between;align-items:center;
  padding:.9rem 2rem;
  background:rgba(19,18,31,.97);
  backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(201,168,76,.22);
}
.topbar-logo{
  font-family:'Playfair Display',serif;
  font-size:1.1rem;font-weight:700;
  color:#f0ece4;text-decoration:none;
}
.topbar-logo span{color:#c9a84c}
.back-btn{
  font-size:.75rem;font-weight:700;letter-spacing:.14em;
  text-transform:uppercase;color:#13121f;
  background:#c9a84c;padding:.5rem 1.25rem;
  text-decoration:none;transition:background .3s;
}
.back-btn:hover{background:#e8c96a}

/* VIEWER */
.viewer-wrap{
  max-width:860px;margin:2rem auto;
  padding:0 1.5rem 3rem;
}
.viewer-info{
  text-align:center;margin-bottom:1.5rem;
  font-size:.78rem;font-weight:600;letter-spacing:.1em;
  text-transform:uppercase;color:rgba(148,143,138,.6);
}
.pdf-frame{
  width:100%;height:85vh;
  border:1px solid rgba(201,168,76,.22);
  border-radius:4px;
  display:block;
}

/* Overlay pour bloquer clic droit sur le PDF */
.pdf-overlay{
  position:relative;
}
.pdf-overlay::after{
  content:'';
  position:absolute;
  inset:0;
  z-index:1;
  cursor:not-allowed;
}

/* Message anti-impression */
.no-print-msg{
  display:none;
  text-align:center;padding:4rem 2rem;
  font-size:1.2rem;color:#c9a84c;
}

@media(max-width:600px){
  .pdf-frame{height:70vh}
  .topbar{padding:.8rem 1rem}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <a href="/" class="topbar-logo">B.<span>Blaise</span></a>
  <a href="/" class="back-btn">← Retour au portfolio</a>
</div>

<!-- VIEWER -->
<div class="viewer-wrap">
  <p class="viewer-info">👁 Consultation uniquement — CV de Behou Blaise</p>
  <div class="pdf-overlay">
    <iframe
      class="pdf-frame"
      src="cv-behou-blaise.pdf#toolbar=0&navpanes=0&scrollbar=1&view=FitH"
      type="application/pdf"
      title="CV Behou Blaise">
    </iframe>
  </div>
</div>

<script>
// Bloquer clic droit
document.addEventListener('contextmenu', e => e.preventDefault());

// Bloquer Ctrl+P / Cmd+P (impression)
document.addEventListener('keydown', e => {
  if((e.ctrlKey || e.metaKey) && e.key === 'p'){
    e.preventDefault();
    alert('⚠️ L\'impression de ce CV n\'est pas autorisée.');
  }
  // Bloquer Ctrl+S (sauvegarde)
  if((e.ctrlKey || e.metaKey) && e.key === 's'){
    e.preventDefault();
  }
  // Bloquer Ctrl+Shift+S
  if((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 's'){
    e.preventDefault();
  }
});

// Détecter tentative d'impression via window.onbeforeprint
window.onbeforeprint = function(){
  document.body.style.display = 'none';
  setTimeout(()=>{ document.body.style.display = ''; }, 100);
};
</script>
</body>
</html>
